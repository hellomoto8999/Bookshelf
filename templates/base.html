<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f6f2">
  <title>Bookshelf</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <a class="sr-only" href="#content">Skip to content</a>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="/">
        <svg viewBox="0 0 48 48" aria-label="Bookshelf logo" class="brand-mark" fill="none">
          <rect x="6" y="10" width="8" height="28" rx="2" fill="currentColor"></rect>
          <rect x="18" y="6" width="8" height="32" rx="2" fill="currentColor" opacity=".88"></rect>
          <rect x="30" y="14" width="12" height="24" rx="2" fill="currentColor" opacity=".72"></rect>
        </svg>
        <span>Bookshelf</span>
      </a>
      <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme"></button>
    </div>
  </header>
  <main id="content" class="container page-shell">
    {% block content %}{% endblock %}
  </main>
  <script>
    (() => {
      const root = document.documentElement;
      const button = document.querySelector('[data-theme-toggle]');
      const storageKey = 'bookshelf-theme';
      const media = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;

      const getStoredTheme = () => {
        try { return localStorage.getItem(storageKey); } catch (e) { return null; }
      };

      const setStoredTheme = (value) => {
        try {
          if (value) localStorage.setItem(storageKey, value);
          else localStorage.removeItem(storageKey);
        } catch (e) {}
      };

      const draw = (theme) => {
        if (!button) return;
        button.innerHTML = theme === 'dark'
          ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
          : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      };

      const applyTheme = (theme) => {
        root.setAttribute('data-theme', theme);
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'dark' ? '#171614' : '#f7f6f2');
        draw(theme);
      };

      let theme = getStoredTheme() || ((media && media.matches) ? 'dark' : 'light');
      applyTheme(theme);

      if (button) {
        button.addEventListener('click', () => {
          theme = theme === 'dark' ? 'light' : 'dark';
          setStoredTheme(theme);
          applyTheme(theme);
        });
      }

      if (media) {
        media.addEventListener('change', (event) => {
          if (!getStoredTheme()) {
            theme = event.matches ? 'dark' : 'light';
            applyTheme(theme);
          }
        });
      }
    })();
  </script>
</body>
</html>
